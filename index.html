<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>PickWise</title>

    <!-- Librería PapaParse -->
    <script src="https://cdn.jsdelivr.net/npm/papaparse@5.3.2/papaparse.min.js"></script>

    <style>
        body {
            font-family: Arial;
            background: #f5f5f5;
            display: flex;
            justify-content: center;
            margin-top: 100px;
        }

        .container {
            text-align: center;
            width: 400px;
        }

        input {
            width: 100%;
            padding: 12px;
            margin: 10px 0;
            border-radius: 8px;
            border: 1px solid #ccc;
        }

        button {
            width: 100%;
            padding: 12px;
            background: black;
            color: white;
            border: none;
            border-radius: 8px;
            cursor: pointer;
        }

        #resultado {
            margin-top: 20px;
            background: white;
            padding: 15px;
            border-radius: 10px;
        }

        .error {
            color: red;
        }
    </style>
</head>

<body>

<div class="container" style="position: relative;">
    <h1>PickWise 🛒</h1>
    <p>Compara productos inteligentes</p>

    <input id="producto1" placeholder="Producto 1">
    <input id="producto2" placeholder="Producto 2">

    <button onclick="comparar()">Comparar</button>

    <div id="resultado"></div>
</div>

<!-- 🔥 TU SCRIPT -->
<script src="script.js"></script>

</body>
</html>
