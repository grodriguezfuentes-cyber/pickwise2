<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ScanWise</title>

  <!-- CSS -->
  <link rel="stylesheet" href="styles.css">

  <!-- 🔥 PWA -->
  <link rel="manifest" href="manifest.json">
  <meta name="theme-color" content="#8b5cf6">

  <!-- iPhone soporte -->
  <link rel="apple-touch-icon" href="icon.png">
  <meta name="apple-mobile-web-app-capable" content="yes">

  <!-- Scanner -->
  <script src="https://unpkg.com/html5-qrcode"></script>
</head>

<body>

<div class="container">

  <!-- LOGO -->
  <div class="logo-container">
    <img src="icon.png" class="logo-img">
    <div class="logo-text">Scan<span>Wise</span></div>
  </div>

  <!-- SUBTITULO -->
  <p class="subtitle">Escanea. Compara. Decide mejor.</p>

  <!-- INSTRUCCIONES -->
  <div class="instructions">
    ✨ Escanea 2 productos y descubre cuál es mejor
  </div>

  <!-- BOTONES -->
  <button class="btn primary" onclick="escanearProducto(1)">
    📷 Escanear producto 1
  </button>

  <button class="btn secondary" onclick="escanearProducto(2)">
    📷 Escanear producto 2
  </button>

  <button class="btn reset" onclick="reiniciar()">
    🔄 Reiniciar
  </button>

  <!-- SCANNER -->
  <div id="reader"></div>

  <!-- RESULTADO -->
  <div id="resultado"></div>

</div>

<script src="script.js?v=10"></script>

<!-- 🔥 SERVICE WORKER -->
<script>
if ("serviceWorker" in navigator) {
  navigator.serviceWorker.register("sw.js");
}
</script>

</body>
</html>
