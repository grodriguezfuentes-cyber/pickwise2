<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>PickWise</title>

  <script src="https://unpkg.com/html5-qrcode"></script>

  <style>
    body {
      font-family: Arial, sans-serif;
      background: #f4f6f8;
      margin: 0;
    }

    .container {
      max-width: 420px;
      margin: auto;
      padding: 20px;
    }

    h1 {
      text-align: center;
      margin-bottom: 5px;
    }

    .subtitle {
      text-align: center;
      color: #666;
      margin-bottom: 20px;
    }

    .instructions {
      background: #fff;
      padding: 12px;
      border-radius: 10px;
      font-size: 14px;
      margin-bottom: 15px;
      text-align: center;
    }

    button {
      width: 100%;
      padding: 14px;
      margin-top: 10px;
      border-radius: 12px;
      border: none;
      font-size: 16px;
      font-weight: bold;
    }

    .btn1 { background: #000; color: white; }
    .btn2 { background: #555; color: white; }
    .btnReset { background: #ddd; }

    #reader {
      margin-top: 20px;
    }

    .card {
      background: white;
      padding: 15px;
      margin-top: 15px;
      border-radius: 14px;
      box-shadow: 0 4px 10px rgba(0,0,0,0.08);
    }

    .winner {
      border-left: 6px solid #2ecc71;
    }

    .loser {
      border-left: 6px solid #e74c3c;
      opacity: 0.85;
    }

    .score {
      font-size: 28px;
      font-weight: bold;
      margin-top: 10px;
    }

    .verde { color: #2ecc71; }
    .amarillo { color: #f39c12; }
    .rojo { color: #e74c3c; }

    .explain {
      font-weight: bold;
      margin-top: 10px;
    }

    .historial-item {
      font-size: 13px;
      padding: 4px 0;
      border-bottom: 1px solid #eee;
    }

    .status {
      text-align: center;
      font-size: 14px;
      color: #555;
      margin-top: 10px;
    }

  </style>
</head>

<body>

<div class="container">
  <h1>PickWise 🛒</h1>
  <p class="subtitle">Elige mejor en segundos</p>

  <div class="instructions">
    📌 Escanea 2 productos y te diremos cuál es mejor
  </div>

  <button class="btn1" onclick="escanearProducto(1)">📷 Escanear producto 1</button>
  <button class="btn2" onclick="escanearProducto(2)">📷 Escanear producto 2</button>
  <button class="btnReset" onclick="reiniciar()">🔄 Reiniciar</button>

  <div id="reader"></div>
  <div id="resultado"></div>
</div>

<script src="script.js"></script>

</body>
</html>
