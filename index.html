<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <title>PickWise</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <style>
    body {
      font-family: Arial;
      background: #f2f2f2;
      display: flex;
      justify-content: center;
      padding-top: 40px;
    }

    .container {
      width: 90%;
      max-width: 400px;
      text-align: center;
      position: relative;
    }

    input {
      width: 100%;
      padding: 12px;
      margin: 10px 0;
      border-radius: 10px;
      border: 1px solid #ccc;
      font-size: 16px;
    }

    button {
      width: 100%;
      padding: 14px;
      background: black;
      color: white;
      border: none;
      border-radius: 10px;
      font-size: 16px;
      cursor: pointer;
    }

    #resultado {
      margin-top: 20px;
      background: white;
      padding: 15px;
      border-radius: 10px;
    }

    .suggestions {
      background: white;
      border: 1px solid #ccc;
      border-radius: 10px;
      text-align: left;
      max-height: 150px;
      overflow-y: auto;
      position: absolute;
      width: 100%;
      z-index: 10;
    }

    .suggestion-item {
      padding: 10px;
      cursor: pointer;
    }

    .suggestion-item:hover {
      background: #eee;
    }

  </style>
</head>

<body>

<div class="container">

  <h1>PickWise 🛒</h1>
  <p>Compara productos inteligentes</p>

  <div style="position:relative;">
    <input id="producto1" placeholder="Producto 1" oninput="mostrarSugerencias(this, 'sug1')">
    <div id="sug1" class="suggestions"></div>
  </div>

  <div style="position:relative;">
    <input id="producto2" placeholder="Producto 2" oninput="mostrarSugerencias(this, 'sug2')">
    <div id="sug2" class="suggestions"></div>
  </div>

  <button onclick="comparar()">Comparar</button>

  <div id="resultado"></div>

</div>

<script src="script.js"></script>

</body>
</html>
