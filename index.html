<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ScanWise</title>

  <link rel="stylesheet" href="styles.css">
  <script src="https://unpkg.com/html5-qrcode"></script>
</head>

<body>

<div class="container">

  <h1 class="logo">Scan<span>Wise</span></h1>
  <p class="subtitle">Escanea. Compara. Decide mejor.</p>

  <div class="instructions">
    ✨ Escanea 2 productos y descubre cuál es mejor
  </div>

  <button class="btn primary" onclick="escanearProducto(1)">
    Escanear producto 1
  </button>

  <button class="btn secondary" onclick="escanearProducto(2)">
    Escanear producto 2
  </button>

  <button class="btn reset" onclick="reiniciar()">
    Reiniciar
  </button>

  <div id="reader"></div>
  <div id="resultado"></div>

</div>

<script src="script.js"></script>

</body>
</html>
