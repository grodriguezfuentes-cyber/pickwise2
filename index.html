<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <title>PickWise</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <style>
    body {
      font-family: Arial;
      background: #f2f2f2;
      display: flex;
      justify-content: center;
      padding-top: 40px;
    }

    .container {
      width: 90%;
      max-width: 400px;
      text-align: center;
    }

    input {
      width: 100%;
      padding: 12px;
      margin: 10px 0;
      border-radius: 10px;
      border: 1px solid #ccc;
      font-size: 16px;
    }

    button {
      width: 100%;
      padding: 14px;
      background: black;
      color: white;
      border: none;
      border-radius: 10px;
      font-size: 16px;
      cursor: pointer;
    }

    #resultado {
      margin-top: 20px;
      background: white;
      padding: 15px;
      border-radius: 10px;
    }

    .error {
      color: red;
      margin-top: 10px;
    }
  </style>
</head>

<body>

<div class="container">
  <h1>PickWise 🛒</h1>
  <p>Compara productos inteligentes</p>

  <input id="producto1" placeholder="Producto 1">
  <input id="producto2" placeholder="Producto 2">

  <button onclick="comparar()">Comparar</button>

  <div id="error" class="error"></div>
  <div id="resultado"></div>
</div>

<script src="script.js"></script>

</body>
</html>
