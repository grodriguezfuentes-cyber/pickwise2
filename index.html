<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>PickWise</title>
    <style>
        body {
            font-family: Arial;
            text-align: center;
            background: #f5f5f5;
        }

        h1 {
            margin-top: 40px;
        }

        input {
            display: block;
            margin: 10px auto;
            padding: 10px;
            width: 250px;
            border-radius: 8px;
            border: 1px solid #ccc;
        }

        button {
            padding: 12px 30px;
            border: none;
            background: black;
            color: white;
            border-radius: 8px;
            cursor: pointer;
        }

        #resultado {
            margin-top: 20px;
            padding: 15px;
            background: #eaeaea;
            border-radius: 10px;
            width: 300px;
            margin-left: auto;
            margin-right: auto;
        }
    </style>
</head>
<body>

<h1>PickWise 🛒</h1>
<p>Compara productos inteligentes</p>

<input id="producto1" placeholder="Producto 1">
<input id="producto2" placeholder="Producto 2">

<button onclick="comparar()">Comparar</button>

<div id="resultado"></div>

<script src="script.js"></script>

</body>
</html>
