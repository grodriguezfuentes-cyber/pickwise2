<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>PickWise</title>

  <script src="https://unpkg.com/html5-qrcode"></script>

  <style>
    body {
      font-family: Arial, sans-serif;
      background: #f2f2f2;
      margin: 0;
      padding: 0;
    }

    .container {
      max-width: 420px;
      margin: auto;
      padding: 20px;
    }

    h1 {
      text-align: center;
      margin-bottom: 5px;
    }

    .subtitle {
      text-align: center;
      color: #666;
      margin-bottom: 20px;
    }

    button {
      width: 100%;
      padding: 15px;
      margin-top: 10px;
      border: none;
      border-radius: 12px;
      font-size: 16px;
      font-weight: bold;
    }

    .btn1 { background: #000; color: white; }
    .btn2 { background: #444; color: white; }
    .btnReset { background: #ddd; }

    #reader {
      margin-top: 20px;
    }

    .card {
      background: white;
      padding: 15px;
      margin-top: 20px;
      border-radius: 15px;
      box-shadow: 0 4px 10px rgba(0,0,0,0.08);
    }

    .score {
      font-size: 28px;
      font-weight: bold;
      margin-top: 10px;
    }

    .verde { color: #2ecc71; }
    .amarillo { color: #f39c12; }
    .rojo { color: #e74c3c; }

    .historial-item {
      font-size: 14px;
      border-bottom: 1px solid #eee;
      padding: 5px 0;
    }
  </style>
</head>

<body>

<div class="container">
  <h1>PickWise 🛒</h1>
  <p class="subtitle">Escanea 2 productos y elige mejor</p>

  <button class="btn1" onclick="escanearProducto(1)">📷 Escanear producto 1</button>
  <button class="btn2" onclick="escanearProducto(2)">📷 Escanear producto 2</button>
  <button class="btnReset" onclick="reiniciar()">🔄 Reiniciar</button>

  <div id="reader"></div>
  <div id="resultado"></div>
</div>

<script src="script.js"></script>

</body>
</html>
