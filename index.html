<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <title>PickWise</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <div class="container">
    <h1>PickWise 🛒</h1>
    <p>Busca y compara productos</p>

    <!-- Producto 1 -->
    <input 
      type="text" 
      id="barcode1" 
      class="input-busqueda"
      placeholder="Producto 1"
      oninput="buscarSugerencias(this.value, 1)"
    >
    <div id="sugerencias1" class="sugerencias"></div>

    <!-- Producto 2 -->
    <input 
      type="text" 
      id="barcode2" 
      class="input-busqueda"
      placeholder="Producto 2"
      oninput="buscarSugerencias(this.value, 2)"
    >
    <div id="sugerencias2" class="sugerencias"></div>

    <button onclick="compararProductos()">Comparar</button>

    <div id="resultado"></div>
  </div>

  <script src="script.js"></script>
</body>
</html>
